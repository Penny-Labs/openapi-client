  /v1/newsletter/send:
    post:
      tags: [Newsletter]
      operationId: sendNewsletter
      summary: Publish newsletter to subscribed recipients (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterSendRequest"
      responses:
        "200":
          description: Newsletter send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSendResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
