openapi: 3.1.0
info:
  title: PennyOS Management API
  version: v1
  description: >
    REST API for management operations across Penny stack services.
    This spec includes currently implemented REST routes only.
servers:
  - url: http://localhost:8090
tags:
  - name: Health
  - name: Institutions
  - name: Runtime
  - name: Link
  - name: LicensePublic
  - name: LicenseAdmin
  - name: Newsletter
paths:
  /healthz:
    get:
      tags: [Health]
      operationId: getHealthz
      summary: Health check
      responses:
        "200":
          description: Service healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok
        "500":
          description: Service unhealthy
          content:
            text/plain:
              schema:
                type: string
                example: failed

  /readyz:
    get:
      tags: [Health]
      operationId: getReadyz
      summary: Readiness check
      responses:
        "200":
          description: Service ready
          content:
            text/plain:
              schema:
                type: string
                example: ok
        "500":
          description: Service not ready
          content:
            text/plain:
              schema:
                type: string
                example: failed

  /v1/institutions/:
    get:
      tags: [Institutions]
      operationId: listInstitutions
      summary: List institutions
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Institution list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstitutionListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/link/token:
    put:
      tags: [Link]
      operationId: createLinkToken
      summary: Create Plaid link token
      security:
        - RuntimeBearer: []
      responses:
        "200":
          description: Link token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLinkTokenResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/plain:
              schema:
                type: string

  /v1/link/connect:
    post:
      tags: [Link]
      operationId: connectLinkToken
      summary: Exchange public token and connect item
      security:
        - RuntimeBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectLinkTokenRequest"
      responses:
        "200":
          description: Token connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectLinkTokenResponse"
        "400":
          description: Invalid request or duplicate connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/plain:
              schema:
                type: string

  /v1/link/{itemID}/transactions:
    get:
      tags: [Link]
      operationId: listLinkTransactions
      summary: List synced managed transactions for a connected item
      security:
        - RuntimeBearer: []
      parameters:
        - in: path
          name: itemID
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Managed transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedTransactionListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/link/{itemID}/transactions/sync:
    post:
      tags: [Link]
      operationId: syncLinkTransactions
      summary: Sync Plaid transactions for a connected item
      security:
        - RuntimeBearer: []
      parameters:
        - in: path
          name: itemID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transactions synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaidTransactionsSyncResult"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/plaid/webhook:
    post:
      tags: [Link]
      operationId: receivePlaidWebhook
      summary: Receive signed Plaid webhooks
      parameters:
        - in: header
          name: Plaid-Verification
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Duplicate webhook accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaidWebhookResponse"
        "202":
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaidWebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/jwks:
    get:
      tags: [Runtime]
      operationId: getRuntimeJwks
      summary: Get active JWKS for lease JWT verification
      responses:
        "200":
          description: Active signing keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwksResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/activate:
    post:
      tags: [Runtime]
      operationId: activateRuntimeInstall
      summary: Activate runtime install and issue lease JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeActivateRequest"
      responses:
        "200":
          description: Runtime install activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeActivateResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "409":
          description: Transfer confirmation required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferConfirmationRequiredResponse"
        "429":
          description: Transfer cooldown active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/lease/renew:
    post:
      tags: [Runtime]
      operationId: renewRuntimeLease
      summary: Renew runtime lease JWT
      security:
        - RuntimeBearer: []
      responses:
        "200":
          description: Lease renewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeRenewResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/usage/batch:
    post:
      tags: [Runtime]
      operationId: ingestRuntimeUsageBatch
      summary: Ingest usage events for billing meters
      security:
        - RuntimeBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeUsageBatchRequest"
      responses:
        "200":
          description: Usage batch processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeUsageBatchResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/instances:
    get:
      tags: [Runtime]
      operationId: listRuntimeInstances
      summary: List runtime instances and websocket connection state (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: query
          name: product_id
          required: false
          schema:
            $ref: "#/components/schemas/ProductID"
        - in: query
          name: license_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: install_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: connected
          required: false
          schema:
            type: boolean
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Runtime instance list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeInstanceListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/activations/overview:
    get:
      tags: [Runtime]
      operationId: getRuntimeActivationOverview
      summary: Get runtime activation KPI overview (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: query
          name: product_id
          required: false
          schema:
            $ref: "#/components/schemas/ProductID"
        - in: query
          name: license_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Runtime activation overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeActivationOverviewResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/activations/history:
    get:
      tags: [Runtime]
      operationId: listRuntimeActivationHistory
      summary: List runtime activation history by day (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: query
          name: product_id
          required: false
          schema:
            $ref: "#/components/schemas/ProductID"
        - in: query
          name: license_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Runtime activation history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeActivationHistoryListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/commands:
    post:
      tags: [Runtime]
      operationId: createRuntimeCommand
      summary: Dispatch runtime command to install/license/product target (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeCommandCreateRequest"
      responses:
        "201":
          description: Runtime command created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      tags: [Runtime]
      operationId: listRuntimeCommands
      summary: List runtime commands with delivery status counters (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: query
          name: product_id
          required: false
          schema:
            $ref: "#/components/schemas/ProductID"
        - in: query
          name: license_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: install_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/RuntimeCommandStatus"
        - in: query
          name: command_type
          required: false
          schema:
            $ref: "#/components/schemas/RuntimeCommandType"
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Runtime command list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/runtime/commands/{commandID}/deliveries:
    get:
      tags: [Runtime]
      operationId: listRuntimeCommandDeliveries
      summary: List runtime command delivery states and acknowledgements (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: path
          name: commandID
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Runtime command delivery list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandDeliveryListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/signup:
    post:
      tags: [LicensePublic]
      operationId: signupLicense
      summary: Create a pending license via public signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseSignupRequest"
      responses:
        "201":
          description: License created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseSignupResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/activate:
    post:
      tags: [LicensePublic]
      operationId: activateLicense
      summary: Activate or transfer license to an install
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseActivateRequest"
      responses:
        "200":
          description: License activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseActivateResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "409":
          description: Transfer requires explicit confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferConfirmationRequiredResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/validate:
    post:
      tags: [LicensePublic]
      operationId: validateLicense
      summary: Validate license and refresh lease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LicenseValidateRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseValidateResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/:
    get:
      tags: [LicenseAdmin]
      operationId: listLicenses
      summary: List licenses (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          required: false
          description: Search by id or key suffix
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/LicenseStatus"
          required: false
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 25
          required: false
        - in: query
          name: cursor
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Paginated license list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

    post:
      tags: [LicenseAdmin]
      operationId: createLicenseAdmin
      summary: Issue new pending license (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "201":
          description: License issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLicenseResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/{licenseID}:
    patch:
      tags: [LicenseAdmin]
      operationId: patchLicense
      summary: Patch license status/expiry (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: path
          name: licenseID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchLicenseRequest"
      responses:
        "200":
          description: Updated license
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/{licenseID}/entitlements:
    get:
      tags: [LicenseAdmin]
      operationId: listLicenseEntitlements
      summary: List product entitlements for a license (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: path
          name: licenseID
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Entitlements list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitlementListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    put:
      tags: [LicenseAdmin]
      operationId: upsertLicenseEntitlement
      summary: Upsert product entitlement for a license (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: path
          name: licenseID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertEntitlementRequest"
      responses:
        "200":
          description: Updated entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "201":
          description: Created entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/{licenseID}/installs:
    get:
      tags: [LicenseAdmin]
      operationId: listLicenseInstalls
      summary: List runtime installs for a license (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: path
          name: licenseID
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Installs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/{licenseID}/transfers:
    get:
      tags: [LicenseAdmin]
      operationId: listLicenseTransfers
      summary: List runtime transfer history for a license (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: path
          name: licenseID
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Transfers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/{licenseID}/usage/daily:
    get:
      tags: [LicenseAdmin]
      operationId: listLicenseUsageDaily
      summary: List daily usage aggregates for a license/product (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: path
          name: licenseID
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: product_id
          required: true
          schema:
            $ref: "#/components/schemas/ProductID"
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Daily usage list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageDailyListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/license/{licenseID}/billing/monthly:
    get:
      tags: [LicenseAdmin]
      operationId: listLicenseBillingMonthly
      summary: List monthly billing lines for a license/product (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: path
          name: licenseID
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: product_id
          required: true
          schema:
            $ref: "#/components/schemas/ProductID"
        - in: query
          name: month
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Monthly billing lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingMonthlyListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/newsletter/:
