components:
  securitySchemes:
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: penny_session_token

  responses:
    BadRequestResponse:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedResponse:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenResponse:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundResponse:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictResponse:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerErrorResponse:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
      required: [error]
      example:
        error: invalid request

    UserStatus:
      type: string
      enum: [pending, active, inactive]

    UserCreateRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
      required: [email]
      example:
        email: user@example.com

    BankAccountStatus:
      type: string
      enum: [active, inactive, closed]

    BankAccountType:
      type: string
      enum: [depository, credit, loan, investment, other]

    BankAccountSubtype:
      type: string
      enum:
        - checking
        - savings
        - money market
        - certificate of deposit
        - credit card
        - auto
        - business
        - commercial
        - construction
        - consumer
        - home equity
        - line of credit
        - mortgage
        - student
        - 401k
        - "529"
        - 401a
        - 403b
        - brokerage
        - cash management
        - ira
        - roth
        - hsa
        - stock plan
        - trust
        - other

    AccountCreateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        official_name:
          type: [string, "null"]
        mask:
          type: [string, "null"]
        type:
          $ref: "#/components/schemas/BankAccountType"
        subtype:
          $ref: "#/components/schemas/BankAccountSubtype"
      required: [name, type, subtype]
      example:
        name: Primary Checking
        official_name: Main Checking
        mask: "1234"
        type: depository
        subtype: checking

    AccountPatchRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        official_name:
          type: [string, "null"]
        mask:
          type: [string, "null"]
        type:
          $ref: "#/components/schemas/BankAccountType"
        subtype:
          $ref: "#/components/schemas/BankAccountSubtype"
        status:
          $ref: "#/components/schemas/BankAccountStatus"
      example:
        name: Payroll Checking
        type: depository
        subtype: checking
        status: inactive

    Account:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        date_added:
          type: string
          format: date-time
        date_modified:
          type: [string, "null"]
          format: date-time
        name:
          type: string
        official_name:
          type: [string, "null"]
        mask:
          type: [string, "null"]
        type:
          $ref: "#/components/schemas/BankAccountType"
        subtype:
          $ref: "#/components/schemas/BankAccountSubtype"
        status:
          $ref: "#/components/schemas/BankAccountStatus"
        current_balance:
          anyOf:
            - $ref: "#/components/schemas/Balance"
            - type: "null"
      required: [id, date_added, name, type, subtype, status, current_balance]
      example:
        id: acct-123
        date_added: "2026-03-01T00:00:00Z"
        date_modified: null
        name: Primary Checking
        official_name: Main Checking
        mask: "1234"
        type: depository
        subtype: checking
        status: active
        current_balance: null

    AuthCredentialRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
      example:
        email: user@example.com
        password: Valid123!

    User:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        date_added:
          type: string
          format: date-time
        date_modified:
          type: [string, "null"]
          format: date-time
        status:
          $ref: "#/components/schemas/UserStatus"
      required: [id, email, date_added, status]
      example:
        id: user-123
        email: user@example.com
        date_added: "2026-03-01T00:00:00Z"
        date_modified: null
        status: pending

    SessionAuthResponse:
      type: object
      additionalProperties: false
      properties:
        user:
          $ref: "#/components/schemas/User"
        session_token:
          type: string
        session_expires_at:
          type: string
          format: date-time
      required:
        - user
        - session_token
        - session_expires_at
      example:
        user:
          id: user-123
          email: user@example.com
          date_added: "2026-03-01T00:00:00Z"
          date_modified: null
          status: pending
        session_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        session_expires_at: "2026-03-29T14:45:00Z"

    SignoutResponse:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
      required: [status]
      example:
        status: signed_out

    UserListResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
          minimum: 0
        next_cursor:
          type: [string, "null"]
      required: [items, total]

    AccountListResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Account"
        total:
          type: integer
          minimum: 0
        next_cursor:
          type: [string, "null"]
      required: [items, total]

    CategoryCreateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
      required: [name]
      example:
        name: Groceries

    CategoryPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
      example:
        name: Food & Dining

    Category:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        date_added:
          type: string
          format: date-time
        date_modified:
          type: [string, "null"]
          format: date-time
        name:
          type: string
      required: [id, date_added, name]
      example:
        id: cat-1
        date_added: "2026-03-01T00:00:00Z"
        date_modified: null
        name: Groceries

    CategoryListResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        total:
          type: integer
          minimum: 0
      required: [items, total]

    BudgetPeriodStatus:
      type: string
      enum: [draft, active, closed]

    BudgetCreateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        currency_code:
          type: string
      required: [name, currency_code]
      example:
        name: Home Budget
        currency_code: USD

    BudgetPatchRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
        currency_code:
          type: string
      example:
        name: Home Budget 2026
        currency_code: USD

    Budget:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        date_added:
          type: string
          format: date-time
        date_modified:
          type: [string, "null"]
          format: date-time
        name:
          type: string
        currency_code:
          type: string
      required: [id, date_added, name, currency_code]
      example:
        id: budget-1
        date_added: "2026-04-01T00:00:00Z"
        date_modified: null
        name: Home Budget
        currency_code: USD

    BudgetListResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Budget"
        total:
          type: integer
          minimum: 0
      required: [items, total]

    BudgetPeriodCreateRequest:
      type: object
      additionalProperties: false
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        target_amount:
          type: number
          format: double
      required: [start_date, end_date, target_amount]
