        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

components:
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: APIKey
    RuntimeBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    XLicenseKey:
      type: apiKey
      in: header
      name: X-License-Key
    XLicenseInstallID:
      type: apiKey
      in: header
      name: X-License-Install-ID
    XLicenseMachineFingerprint:
      type: apiKey
      in: header
      name: X-License-Machine-Fingerprint

  responses:
    BadRequestResponse:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedResponse:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
        text/plain:
          schema:
            type: string
            example: Unauthorized
    ForbiddenResponse:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundResponse:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerErrorResponse:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    LicenseStatus:
      type: string
      enum: [active, pending, revoked, suspended, expired]

    ProductID:
      type: string
      enum: [pennyos, openchat]

    License:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key_suffix:
          type: string
        date_added:
          type: string
          format: date-time
        date_modified:
          type: [string, "null"]
          format: date-time
        date_expires:
          type: [string, "null"]
          format: date-time
        status:
          $ref: "#/components/schemas/LicenseStatus"
        holder_name:
          type: [string, "null"]
        holder_email:
          type: [string, "null"]
        holder_company:
          type: [string, "null"]
      required: [id, key_suffix, date_added, status]

    LicenseListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/License"
        total:
          type: integer
        next_cursor:
          type: [string, "null"]
      required: [items, total]

    CreateLicenseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        license_id:
          type: string
          format: uuid
        license_key:
          type: string
      required: [id, license_id, license_key]

    PatchLicenseRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LicenseStatus"
        date_expires:
          type: [string, "null"]
          format: date-time
      additionalProperties: false

    LicenseSignupRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        company:
          type: string
      required: [name, email, company]
      additionalProperties: false

    LicenseSignupResponse:
      type: object
      properties:
        license_id:
          type: string
          format: uuid
        license_key:
          type: string
        status:
          $ref: "#/components/schemas/LicenseStatus"
      required: [license_id, license_key, status]

    LicenseActivateRequest:
      type: object
      properties:
        license_key:
          type: string
        install_id:
          type: string
          format: uuid
        machine_fingerprint:
          type: string
        confirm_transfer:
          type: boolean
          default: false
      required: [license_key, install_id, machine_fingerprint]
      additionalProperties: false

    LicenseActivateResponse:
      type: object
      properties:
        license_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/LicenseStatus"
        activation_id:
          type: string
          format: uuid
        lease_expires_at:
          type: string
          format: date-time
        transferred:
          type: boolean
        warning:
          type: string
      required: [license_id, status, activation_id, lease_expires_at, transferred]

    TransferConfirmationRequiredResponse:
      type: object
      properties:
        error:
          type: string
          enum: [transfer_confirmation_required]
        reason:
          type: string
      required: [error, reason]

    LicenseValidateRequest:
      type: object
      properties:
        license_key:
          type: string
        install_id:
          type: string
          format: uuid
        machine_fingerprint:
          type: string
      required: [license_key, install_id, machine_fingerprint]
      additionalProperties: false

    LicenseValidateResponse:
      type: object
      properties:
        valid:
          type: boolean
        reason:
          type: string
        license_id:
          type: string
          format: uuid
        status:
          type: string
        lease_expires_at:
          type: [string, "null"]
          format: date-time
      required: [valid, reason, lease_expires_at]

    Institution:
      type: object
      properties:
        ID:
          type: string
          format: uuid
        name:
          type: string
        country_code:
          type: string
        logo_url:
          type: [string, "null"]
          format: uri
        website_url:
          type: [string, "null"]
          format: uri
        website_login_url:
          type: [string, "null"]
          format: uri
      required: [ID, name, country_code]

    InstitutionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Institution"
        total:
          type: integer
        next_cursor:
          type: [string, "null"]
      required: [items, total]

    CreateLinkTokenResponse:
      type: object
      properties:
        link_token:
          type: string
      required: [link_token]

    LinkInstitution:
      type: object
      properties:
        name:
          type: string
        institution_id:
          type: string
      required: [institution_id]

    LinkAccount:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mask:
          type: string
        type:
          type: string
        subtype:
          type: string
      required: [id]

    ConnectLinkMetadata:
      type: object
      properties:
        institution:
          $ref: "#/components/schemas/LinkInstitution"
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/LinkAccount"
      required: [institution, accounts]

    ConnectLinkTokenRequest:
      type: object
      properties:
        public_token:
          type: string
        link_token:
          type: string
        metadata:
          $ref: "#/components/schemas/ConnectLinkMetadata"
      required: [public_token, link_token, metadata]
      additionalProperties: false

    ConnectLinkTokenResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            type: object
            additionalProperties: true
        connection_id:
          type: string
          format: uuid
      required: [accounts, connection_id]


    ManagedTransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        item_id:
          type: string
          format: uuid
        provider:
          type: string
          example: plaid
        provider_transaction_id:
          type: string
        provider_account_id:
          type: string
        transaction_date:
          type: string
          format: date
        authorized_date:
          type: [string, "null"]
          format: date
        name:
          type: string
        merchant_name:
          type: [string, "null"]
        amount:
          type: number
          format: double
        iso_currency_code:
          type: [string, "null"]
        pending:
          type: boolean
        removed:
          type: boolean
        raw:
          type: object
          additionalProperties: true
        date_added:
          type: string
          format: date-time
        date_modified:
          type: [string, "null"]
          format: date-time
      required:
        - id
        - item_id
        - provider
        - provider_transaction_id
        - provider_account_id
        - transaction_date
        - name
        - amount
        - pending
        - removed
        - raw
        - date_added

    ManagedTransactionListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ManagedTransaction"
        total:
          type: integer
        next_cursor:
          type: [string, "null"]
      required: [items, total]

    PlaidTransactionsSyncResult:
      type: object
      properties:
        item_id:
          type: string
          format: uuid
        next_cursor:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        pages:
          type: integer
        added_count:
          type: integer
        modified_count:
          type: integer
        removed_count:
          type: integer
        request_id:
          type: string
        had_more:
          type: boolean
      required:
        - item_id
        - next_cursor
        - started_at
        - completed_at
        - pages
        - added_count
        - modified_count
        - removed_count
        - had_more

    PlaidWebhookResponse:
      type: object
      properties:
        duplicate:
          type: boolean
        event_key:
          type: string
        kid:
          type: string
        ignored:
          type: boolean
        reason:
          type: string
        command_created:
          type: boolean
        command_id:
          type: string
        warning:
          type: string
      required: [duplicate, event_key]

    JwkKey:
      type: object
      properties:
        kty:
          type: string
          example: OKP
        crv:
          type: string
          example: Ed25519
        kid:
          type: string
        alg:
          type: string
          example: EdDSA
        use:
          type: string
          example: sig
        x:
          type: string
      required: [kty, crv, kid, alg, use, x]

    JwksResponse:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JwkKey"
      required: [keys]

    RuntimeActivateRequest:
      type: object
      properties:
        license_key:
          type: string
        product_id:
          $ref: "#/components/schemas/ProductID"
        install_id:
          type: string
          format: uuid
        install_public_key:
          type: string
          description: Base64-encoded Ed25519 public key
        challenge:
          type: string
        challenge_signature:
          type: string
          description: Base64-encoded signature of challenge
        confirm_transfer:
          type: boolean
          default: false
      required: [license_key, product_id, install_id, install_public_key, challenge, challenge_signature]
      additionalProperties: false

    RuntimeActivateResponse:
      type: object
      properties:
        license_id:
          type: string
          format: uuid
        product_id:
          $ref: "#/components/schemas/ProductID"
        install_id:
          type: string
          format: uuid
        lease_token:
          type: string
        lease_expires_at:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
        caps:
          type: object
          additionalProperties:
            type: integer
        transferred:
          type: boolean
        warning:
          type: string
      required: [license_id, product_id, install_id, lease_token, lease_expires_at, scopes, caps, transferred]

    RuntimeRenewResponse:
      type: object
      properties:
        lease_token:
          type: string
        lease_expires_at:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
        caps:
          type: object
          additionalProperties:
            type: integer
      required: [lease_token, lease_expires_at, scopes, caps]

    RuntimeUsageEvent:
      type: object
      properties:
        event_id:
          type: string
          format: uuid
        meter_type:
          type: string
          enum:
            - transactions_connected_account_month
            - recurring_connected_account_month
            - transactions_refresh_success_call
        quantity:
          type: integer
          minimum: 1
        occurred_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required: [meter_type, quantity]

    RuntimeUsageBatchRequest:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeUsageEvent"
      required: [events]
      additionalProperties: false

    RuntimeUsageBatchResponse:
      type: object
      properties:
        accepted:
          type: integer
        ignored:
          type: integer
      required: [accepted, ignored]

    RuntimeCommandStatus:
      type: string
      enum: [queued, sent, acked, expired, failed]

    RuntimeCommandType:
      type: string
      enum: [pull_data, notify, license_enforce, license_resync]

    RuntimeCommandTargetScope:
      type: string
      enum: [install, license_product, product]

    RuntimeCommandTarget:
      type: object
      properties:
        scope:
          $ref: "#/components/schemas/RuntimeCommandTargetScope"
        product_id:
          $ref: "#/components/schemas/ProductID"
        license_id:
          type: string
          format: uuid
        install_id:
          type: string
          format: uuid
      required: [scope, product_id]

    RuntimeCommandCreateRequest:
      type: object
      properties:
        command_type:
          $ref: "#/components/schemas/RuntimeCommandType"
        target:
          $ref: "#/components/schemas/RuntimeCommandTarget"
        payload:
          type: object
          additionalProperties: true
        expires_at:
          type: string
          format: date-time
        expires_in_seconds:
          type: integer
          minimum: 1
        retry_interval_seconds:
          type: integer
          minimum: 1
        max_attempts:
          type: integer
          minimum: 1
      required: [command_type, target]
      additionalProperties: false

    RuntimeCommandCreateResponse:
      type: object
      properties:
        command_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/RuntimeCommandStatus"
        target_count:
          type: integer
        expires_at:
          type: string
          format: date-time
      required: [command_id, status, target_count, expires_at]

    RuntimeCommandSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        command_type:
          $ref: "#/components/schemas/RuntimeCommandType"
        target_scope:
          $ref: "#/components/schemas/RuntimeCommandTargetScope"
        product_id:
          $ref: "#/components/schemas/ProductID"
        license_id:
          type: [string, "null"]
          format: uuid
        install_id:
          type: [string, "null"]
          format: uuid
        payload:
          type: object
          additionalProperties: true
        status:
          $ref: "#/components/schemas/RuntimeCommandStatus"
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        retry_interval_seconds:
          type: integer
        max_attempts:
          type: integer
        date_added:
          type: string
          format: date-time
        date_modified:
          type: string
          format: date-time
        total_targets:
          type: integer
        acked_count:
          type: integer
        sent_count:
          type: integer
        queued_count:
          type: integer
        failed_count:
          type: integer
        expired_count:
          type: integer
      required:
        - id
        - command_type
        - target_scope
        - product_id
        - payload
        - status
        - issued_at
        - expires_at
        - retry_interval_seconds
        - max_attempts
        - date_added
        - date_modified
        - total_targets
        - acked_count
        - sent_count
        - queued_count
        - failed_count
        - expired_count

    RuntimeCommandListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeCommandSummary"
        total:
          type: integer
        next_cursor:
          type: [string, "null"]
      required: [items, total]

    RuntimeCommandDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        command_id:
          type: string
          format: uuid
        license_id:
          type: string
          format: uuid
        product_id:
          $ref: "#/components/schemas/ProductID"
        install_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/RuntimeCommandStatus"
        attempt_count:
          type: integer
        last_attempt_at:
          type: [string, "null"]
          format: date-time
        next_attempt_at:
          type: string
          format: date-time
        acked_at:
          type: [string, "null"]
          format: date-time
        received_at:
          type: [string, "null"]
          format: date-time
        ack_details:
          type: object
          additionalProperties: true
        last_error:
          type: [string, "null"]
        date_added:
          type: string
          format: date-time
        date_modified:
          type: string
          format: date-time
      required:
        - id
        - command_id
        - license_id
        - product_id
        - install_id
        - status
        - attempt_count
        - next_attempt_at
        - ack_details
        - date_added
        - date_modified

    RuntimeCommandDeliveryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeCommandDelivery"
        total:
          type: integer
        next_cursor:
          type: [string, "null"]
      required: [items, total]

    RuntimeInstanceStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        license_id:
          type: string
          format: uuid
        product_id:
          $ref: "#/components/schemas/ProductID"
        install_id:
          type: string
          format: uuid
        status:
          type: string
        activated_at:
          type: string
          format: date-time
        transferred_at:
          type: [string, "null"]
          format: date-time
        last_seen_at:
          type: [string, "null"]
          format: date-time
        last_seen_ip:
          type: [string, "null"]
        connected:
          type: boolean
        client_id:
          type: [string, "null"]
        connected_at:
          type: [string, "null"]
          format: date-time
        disconnected_at:
          type: [string, "null"]
          format: date-time
      required:
        - id
        - license_id
        - product_id
        - install_id
