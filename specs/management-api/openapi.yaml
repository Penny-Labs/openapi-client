  /v1/newsletter/subscribers:
    get:
      tags: [Newsletter]
      operationId: listSubscribers
      summary: List subscribers (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: mailing_list_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Subscriber list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/newsletter/mailing-lists:
    get:
      tags: [Newsletter]
      operationId: listMailingLists
      summary: List mailing lists (admin)
      security:
        - AdminBearer: []
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 25
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Mailing lists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailingListListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/newsletter/subscribe:
    post:
      tags: [Newsletter]
      operationId: subscribeNewsletter
      summary: Subscribe email to a mailing list (admin)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterSubscribeRequest"
      responses:
        "204":
          description: Subscription accepted
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
