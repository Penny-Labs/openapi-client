          required: false
          schema:
            type: string
      responses:
        "200":
          description: Newsletter list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
