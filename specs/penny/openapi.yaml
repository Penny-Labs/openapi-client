openapi: 3.1.0
info:
  title: PennyOS API
  version: v1
  description: >
    REST API for PennyOS core functionality.
    This spec includes currently implemented REST routes only.
  license:
    name: See LICENSE.md
    identifier: AGPL-3.0-or-later
servers:
  - url: http://localhost:8080
tags:
  - name: Auth
    description: Local authentication and session lifecycle operations.
  - name: Users
    description: User creation and retrieval operations.
  - name: Accounts
    description: Bank account and transaction operations.
  - name: Categories
    description: User category management operations.
  - name: Budgets
    description: User budget, period, and allocation planning operations.
  - name: Tags
    description: User tag management and transaction tagging operations.
paths:
  /v1/auth/signup:
    post:
      tags: [Auth]
      operationId: signup
      summary: Create local credentials and start session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentialRequest"
      responses:
        "201":
          description: Signup succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/auth/signin:
    post:
      tags: [Auth]
      operationId: signin
      summary: Authenticate credentials and start session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentialRequest"
      responses:
        "200":
          description: Signin succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/auth/signout:
    post:
      tags: [Auth]
      operationId: signout
      summary: Revoke current session token and clear session cookie
      responses:
        "200":
          description: Signout succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignoutResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/auth/me:
    get:
      tags: [Auth]
      operationId: getSessionUser
      summary: Get current authenticated user
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Session user found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/users:
    post:
      tags: [Users]
      operationId: createUser
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users (admin only)
      security:
        - SessionCookieAuth: []
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
          description: Comma-separated user status filters.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: User page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/users/{userID}:
    get:
      tags: [Users]
      operationId: getUserByID
      summary: Get user by ID (self only)
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: userID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/categories:
    post:
      tags: [Categories]
      operationId: createCategory
      summary: Create a category for current authenticated user
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryCreateRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      tags: [Categories]
      operationId: listCategories
      summary: List categories for current authenticated user
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/categories/{categoryID}:
    get:
      tags: [Categories]
      operationId: getCategoryByID
      summary: Get category by ID for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: categoryID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    patch:
      tags: [Categories]
      operationId: patchCategory
      summary: Patch category fields for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: categoryID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryPatchRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    delete:
      tags: [Categories]
      operationId: deleteCategory
      summary: Delete category by ID for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: categoryID
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Category deleted
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/budgets:
    post:
      tags: [Budgets]
      operationId: createBudget
      summary: Create a budget for current authenticated user
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetCreateRequest"
      responses:
        "201":
          description: Budget created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      tags: [Budgets]
      operationId: listBudgets
      summary: List budgets for current authenticated user
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Budget list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/budgets/{budgetID}:
    get:
      tags: [Budgets]
      operationId: getBudgetByID
      summary: Get budget by ID for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: budgetID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Budget found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    patch:
      tags: [Budgets]
      operationId: patchBudget
      summary: Patch budget fields for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: budgetID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetPatchRequest"
      responses:
        "200":
          description: Budget updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    delete:
      tags: [Budgets]
      operationId: deleteBudget
      summary: Delete budget by ID for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: budgetID
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Budget deleted
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/budgets/{budgetID}/periods:
    post:
      tags: [Budgets]
      operationId: createBudgetPeriod
      summary: Create a budget period for a budget owned by the current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: budgetID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetPeriodCreateRequest"
      responses:
        "201":
          description: Budget period created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetPeriod"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      tags: [Budgets]
      operationId: listBudgetPeriods
      summary: List budget periods for a budget owned by the current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: budgetID
          required: true
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/BudgetPeriodStatus"
      responses:
        "200":
          description: Budget period list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetPeriodListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/budgets/{budgetID}/periods/{budgetPeriodID}:
    get:
      tags: [Budgets]
      operationId: getBudgetPeriodByID
      summary: Get budget period by ID for a budget owned by the current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: budgetID
          required: true
          schema:
            type: string
        - in: path
          name: budgetPeriodID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Budget period found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetPeriod"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    patch:
      tags: [Budgets]
      operationId: patchBudgetPeriod
      summary: Patch budget period fields for a budget owned by the current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: budgetID
          required: true
          schema:
            type: string
        - in: path
          name: budgetPeriodID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetPeriodPatchRequest"
      responses:
        "200":
          description: Budget period updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetPeriod"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/budgets/{budgetID}/periods/{budgetPeriodID}/allocations:
    put:
      tags: [Budgets]
      operationId: replaceBudgetPeriodAllocations
      summary: Replace all category allocations for a budget period owned by the current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: budgetID
          required: true
          schema:
            type: string
        - in: path
          name: budgetPeriodID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetPeriodAllocationsReplaceRequest"
      responses:
        "200":
          description: Budget period allocations replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetPeriod"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/tags:
    post:
      tags: [Tags]
      operationId: createTag
      summary: Create a tag for current authenticated user
      security:
        - SessionCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagCreateRequest"
      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      tags: [Tags]
      operationId: listTags
      summary: List tags for current authenticated user
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Tag list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/tags/{tagID}:
    get:
      tags: [Tags]
      operationId: getTagByID
      summary: Get tag by ID for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: tagID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tag found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    patch:
      tags: [Tags]
      operationId: patchTag
      summary: Patch tag fields for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: tagID
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagPatchRequest"
      responses:
        "200":
          description: Tag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    delete:
      tags: [Tags]
      operationId: deleteTag
      summary: Delete tag by ID for current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: path
          name: tagID
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Tag deleted
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/transactions:
    get:
      tags: [Accounts]
      operationId: listTransactionsForAccounts
      summary: List transactions across specified accounts owned by the current authenticated user
      security:
        - SessionCookieAuth: []
      parameters:
        - in: query
          name: account_ids
          required: true
          schema:
            type: string
          description: Comma-separated account IDs. All account IDs must be owned by the current authenticated user.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: cursor
          required: false
          schema:
            type: string
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: pending
          required: false
          schema:
            type: boolean
        - in: query
          name: date_from
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: date_to
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: amount_min
          required: false
          schema:
            type: number
            format: double
        - in: query
          name: amount_max
          required: false
          schema:
            type: number
            format: double
        - in: query
          name: category_id
          required: false
          schema:
            type: string
        - in: query
          name: tag_ids
          required: false
          schema:
            type: string
          description: Comma-separated tag IDs.
        - in: query
          name: tag_mode
          required: false
          schema:
            type: string
            enum: [any, all]
            default: any
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Transaction page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"

  /v1/transactions/aggregates:
    get:
      tags: [Accounts]
      operationId: aggregateTransactions
      summary: Aggregate transactions for user-owned accounts
      security:
        - SessionCookieAuth: []
      parameters:
        - in: query
          name: account_ids
          required: false
          schema:
            type: string
          description: Comma-separated account IDs. When omitted, all user-owned accounts are included.
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: pending
          required: false
          schema:
            type: boolean
        - in: query
          name: date_from
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: date_to
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: amount_min
          required: false
          schema:
            type: number
            format: double
        - in: query
          name: amount_max
          required: false
          schema:
            type: number
            format: double
        - in: query
          name: category_id
